<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Sistem Presensi Pegawai</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="user-info">
                <span class="user-name" id="adminName">Administrator</span>
                <span class="user-role">Role: Admin</span>
            </div>
            <button class="btn-logout" id="btnLogout">Keluar</button>
        </div>

        <div id="alertBox" class="alert" style="display: none;"></div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
            <div class="info-bar" style="margin-bottom: 0; flex-direction: column; justify-content: center; align-items: center; gap: 10px;">
                <div style="font-size: 16px;">Tanggal Hari Ini</div>
                <strong id="currentDate" style="font-size: 20px; color: var(--text-primary);">-</strong>
                <div style="font-size: 16px; margin-top: 10px;">Total Pegawai Hadir</div>
                <strong id="totalHadir" style="font-size: 36px; color: var(--text-primary);">0</strong>
            </div>
            
            <div class="chart-container" style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 200px;">
                <canvas id="attendanceChart"></canvas>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h3 style="font-size: 18px; font-weight: 600;">Daftar Kehadiran Pegawai Hari Ini</h3>
            <button id="btnRefresh" class="btn btn-primary" style="width: auto; padding: 6px 12px; font-size: 13px;">Segarkan</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Pegawai</th>
                        <th>Jabatan</th>
                        <th>Divisi</th>
                        <th>Jam Masuk</th>
                        <th>Jam Keluar</th>
                        <th>Status Masuk</th>
                        <th>Status Pulang</th>
                    </tr>
                </thead>
                <tbody id="attendanceTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; color: var(--text-secondary);">Memuat data presensi...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
